<style>
.purge textarea {
  width: 100%;
  overflow: hidden;
  resize: vertical;
  min-height: 150px;
  background: var(--color-surface);
  border: 1px solid var(--color-border-ui);
}

.purge button[type=submit] {
  margin-top: 0.5em;
  border: 1px solid var(--color-border-ui);
  padding: 0.4em 1.5em;
}

.purge .report {
  text-align: left;
}

.purge .wait:before {
  content: "👆";
  margin-right: 5px;
}

.purge .success:before {
  content: "👍";
  margin-right: 5px;
}

.purge .success {
  color: var(--color-success);
}

.purge .error:before {
  content: "👎";
  margin-right: 5px;
}

.purge .error {
  color: var(--color-error);
}
</style>

<p class="hero" id="purge">
  <strong>Purge cache</strong>
  <span class="desc">
    Paste URLs below to purge cached files. Up to 30 URLs per request.
  </span>
</p>

<form method="POST" action="/purge" class="purge" id="purge-form">
  <textarea autofocus required="true" name="files" placeholder="https://rawcdn.githack.com/user/repo/branch/file1.ext&#10;http://raw.githack.com/user/repo/branch/file2.ext&#10;..."></textarea>
  <button type="submit" class="url-action-button">Purge!</button>
  <div class="report">
    <span class="wait">waiting</span>
    <span class="success hidden">success</span>
    <span class="error hidden">error</span>
  </div>
</form>

<script>
<!--# include file="internal/common.js" -->

const filesTextarea = document.querySelector('.purge textarea');
const filesSubmit = document.querySelector('.purge button[type=submit]');
const filesWait = document.querySelector('.purge .wait');
const filesSuccess = document.querySelector('.purge .success');
const filesError = document.querySelector('.purge .error');

filesTextarea.style.overflowY = 'hidden';
filesTextarea.addEventListener('input', () => {
  const result = [];
  for (const url of filesTextarea.value.split('\n')) {
    const trimmed = decodeURIComponent(url.trim());
    const [converted] = convertUrl(trimmed) ?? [];
    result.push(converted ? cdnize(converted) : trimmed);
  }
  filesTextarea.value = result.join('\n');
  filesTextarea.style.height = 'auto';
  filesTextarea.style.height = filesTextarea.scrollHeight + 'px';
});

document.getElementById('purge-form').onsubmit = () => {
  filesTextarea.disabled = true;
  filesSubmit.disabled = true;
  filesSuccess.classList.add('hidden');
  filesError.classList.add('hidden');
  filesWait.classList.remove('hidden');
  const body = JSON.stringify({
    files: filesTextarea.value.split("\n")
  });
  fetch('/purge', {
    method: 'POST',
    body: body,
    headers: {"Content-Type": "application/json"}
  })
    .then(res => res.json())
    .then(res => {
      const operand = res.success ? filesSuccess : filesError;
      operand.textContent = res.response;
      operand.classList.remove('hidden');
    })
    .catch(err => {
      filesError.textContent = 'unknown error';
      filesError.classList.remove('hidden');
    })
    .finally(() => {
      filesWait.classList.add('hidden');
      filesSubmit.disabled = false;
      filesTextarea.disabled = false;
    });
  return false;
}

</script>
