<style>
:root {
  --color-bg:               #fff;
  --color-text:             #333;
  --color-text-muted:       #555;
  --color-link:             #0000ff;
  --color-border:           #efefef;
  --color-border-ui:        #dfdfdf;
  --color-surface:          #f8f8f8;
  --color-active:           #badeff;
  --color-invalid-bg:       #FFF7F7;
  --color-valid-bg:         #F2FFEB;
  --color-highlight-bg:     rgba(255, 255, 0, 0.10);
  --color-highlight-border: rgba(255, 255, 0, 0.50);
  --color-success:          #2a7a2a;
  --color-error:            #c0392b;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-bg:               #1e1e1e;
    --color-text:             #ccc;
    --color-text-muted:       #888;
    --color-link:             #6ab0f5;
    --color-border:           #333;
    --color-border-ui:        #444;
    --color-surface:          #2a2a2a;
    --color-active:           #1a3a5c;
    --color-invalid-bg:       #2a1515;
    --color-valid-bg:         #152a15;
    --color-highlight-bg:     rgba(255, 255, 0, 0.05);
    --color-highlight-border: rgba(255, 255, 0, 0.25);
    --color-success:          #4caf50;
    --color-error:            #e57373;
  }
}

html {
  background: var(--color-bg);
  color: var(--color-text);
  color-scheme: light dark;
}

html, button, input, textarea {
  font: 16px/1.5 'Trebuchet MS', sans-serif;
}

body {
  margin: 0 auto;
  padding: 0;
}

a { color: var(--color-link); }

.offscreen {
  left: -9999px;
  position: absolute;
}

/* -- Header ---------------------------------------------------------------- */
.hd {
  border-bottom: 1px solid var(--color-border);
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: baseline;
  padding: 0 1em;
}

.hd .logo svg {
  margin: 0 0.2em 0 0.4em;
  width: 56px;
  height: auto;
  position: relative;
  top: 15px;
}

.hd .nav ul {
  margin: 0;
  padding: 0;
  white-space: nowrap;
}

.hd .nav li {
  display: inline-block;
  line-height: 48px;
  margin: 0 0.6em;
}

.hd .nav a, .hd .nav {
  border: 0;
  color: var(--color-text-muted);
  padding: 5px 8px;
  text-decoration: none;
}

.hd .nav a:hover {
  background: var(--color-border);
}

.hd .title {
  color: var(--color-text);
  font-size: 2em;
  line-height: 48px;
  margin: 0;
  white-space: nowrap;
}

.hd .title a {
  color: inherit;
  text-decoration: none;
}

@media (max-width: 767px) {
  .hd {
    justify-content: center;
    gap: 0 1em;
  }

  .hd .logo svg {
    height: 20px;
    width: auto;
    top: 4px;
  }

  .hd .nav li {
    margin: 0 0.2em;
  }

  .hd .nav a {
    padding: 3px 4px;
  }

  .hd .title {
    font-size: 1.2em;
  }
}

/* -- Content --------------------------------------------------------------- */
.bd,
.ft {
  padding: 0 30px;
}

.bd {
  margin: 0 auto;
  max-width: 1140px;
}

.hero {
  font-size: 3em;
  line-height: 1.5;
  padding: 0 3em;
  text-align: center;
}

.hero .desc {
  font-size: 1rem;
  display: block;
}

.url {
  background: var(--color-surface);
  border: none;
  padding-left: 6px;
  padding-right: 6px;
  text-align: center;
  width: 100%;
}

/* -- Misc ------------------------------------------------------------------ */
.invalid {
  background: var(--color-invalid-bg);
}

.valid {
  background: var(--color-valid-bg);
}

.hidden {
  display: none;
}

/* -- URL container --------------------------------------------------------- */
.url-container {
  display: flex;
  border: 1px solid var(--color-border-ui);
}

.url-action-button {
  white-space: nowrap;
  text-align: center;
  border: none;
  border-left: 1px solid var(--color-border-ui);
  cursor: pointer;
  display: inline-block;
  min-width: 5em;
}

.url-action-button:hover, .url-action-button:disabled {
  background: var(--color-border);
}

.url-action-button:disabled {
  cursor: not-allowed;
}

.url-action-button:active:not(:disabled) {
  background: var(--color-active);
}

/* -- Footer ---------------------------------------------------------------- */
.ft {
  text-align: left;
  border-top: 1px solid var(--color-border);
  color: var(--color-text-muted);
  font-size: 0.8em;
  margin: 3em 0 0;
}

.ft a {
  color: inherit;
  text-decoration: underline;
}

@media (max-width: 975px) {
  .bd,
  .ft {
    padding: 0 1em;
  }

  .hero { font-size: 1.6em; }
}

@media (max-width: 767px) {
  .hero { font-size: 1.4em; padding: 0; }
}
</style>

</head>

      <li><a href="/purge-cache">Purge cache</a></li>
      <li><a href="/donate">Donate ❤️</a></li>
    </ul>
  </nav>
</header>
